name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_NAME: as_terrasense
      DB_USER: postgres
      DB_PASSWORD: postgres
      SECRET_KEY: ci-secret-key
      JWT_SECRET_KEY: ci-jwt-secret-key
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: ci-admin-pass
      FLASK_DEBUG: 'False'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyflakes pytest
      - name: Static analysis (pyflakes)
        working-directory: backend
        run: pyflakes app controllers main.py db.py || true
      - name: Bootstrap database
        working-directory: backend
        run: python scripts/setup_postgres.py
      - name: Run tests
        working-directory: backend
        run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Build
        working-directory: frontend
        run: pnpm run build
      - name: Run tests
        working-directory: frontend
        run: pnpm run test:run
